<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | TaskFlow</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

  <header class="topo">
    <div class="container">
      <p class="logo">Sistema Gerenciador de Tarefas</p>
    </div>
  </header>

  <main id="conteudo-principal" class="container auth-page">
    <section class="auth-card">
      <h1>Entrar</h1>
      <p class="subtexto">Acesse sua conta para gerenciar suas tarefas.</p>

      <form action="#" method="post" class="formulario">
        <div class="campo">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com" required>
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="botao">Entrar</button>

        <p class="link-texto">
          Ainda não tem conta?
          <a href="pages/cadastro.html">Cadastre-se</a>
        </p>
      </form>
    </section>
  </main>

  <footer class="rodape">
    <div class="container">
      <p>© 2026 - Projeto Sistema Gerenciador de Tarefas. Curso Programador Web. </p>
    </div>
  </footer>
</body>
</html>

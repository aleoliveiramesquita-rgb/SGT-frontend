<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Tarefa | Fluxo de Tarefas</title>
  <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>
  <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

  <header class="topo">
    <div class="container barra-topo">
      <p class="logo">Sistema Gerenciador de Tarefas</p>
      <nav aria-label="Principal">
        <a href="pagedasboardtarefas.html">Tarefas</a>
        <a href="../index.html">Sair</a>
      </nav>
    </div>
  </header>

  <main id="conteudo-principal" class="container pagina-dashboard">
    <section class="form-card">
      <h1>Editar tarefa</h1>
      <p class="subtexto">Atualize os dados da tarefa selecionada.</p>

      <form action="#" method="post" class="formulario">
        <div class="campo">
          <label for="titulo">Título da tarefa</label>
          <input
            id="titulo"
            name="titulo"
            type="text"
            value="Estudar HTML semântico"
            required
          >
        </div>

        <div class="campo">
          <label for="descricao">Descrição</label>
          <textarea
            id="descricao"
            name="descricao"
            rows="5"
            required
          >Revisar header, main, section, article e footer.</textarea>
        </div>

        <div class="campo">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="pendente" selected>Pendente</option>
            <option value="andamento">Em andamento</option>
            <option value="concluida">Concluída</option>
          </select>
        </div>

        <div class="campo">
          <label for="prioridade">Prioridade</label>
          <select id="prioridade" name="prioridade">
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta" selected>Alta</option>
          </select>
        </div>

        <div class="campo">
          <label for="prazo">Prazo</label>
          <input id="prazo" name="prazo" type="date" value="2026-04-30">
        </div>

        <div class="acoes-formulario">
          <a class="botao-secundario" href="pagedasboardtarefas.html">Cancelar</a>
          <button type="submit" class="botao">Salvar alterações</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
